# =============================================================================
# ConfigMap – non-sensitive application configuration
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: powerprice-config
  namespace: powerprice
  labels:
    app: powerprice
data:
  # Application
  APP_ENV: "production"
  APP_NAME: "PowerPrice Futures Signals"
  APP_VERSION: "1.0.0"
  LOG_LEVEL: "INFO"

  # Database
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "powerprice"
  POSTGRES_USER: "ppuser"

  # Redis / Celery
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  CELERY_BROKER_URL: "redis://redis:6379/0"
  CELERY_RESULT_BACKEND: "redis://redis:6379/1"

  # Data ingestion
  SMARD_BASE_URL: "https://www.smard.de/app/chart_data"
  ENTSOE_BASE_URL: "https://web-api.tp.entsoe.eu/api"
  OPEN_METEO_BASE_URL: "https://api.open-meteo.com/v1"

  # Signal generation
  SIGNAL_LOOKBACK_HOURS: "168"       # 7 days
  SIGNAL_MIN_CONFIDENCE: "0.55"
  MODEL_RETRAIN_INTERVAL_HOURS: "24"

  # Paper trading / Futures cost model
  FUTURES_SPREAD_EUR_MWH: "0.50"
  FUTURES_COMMISSION_PCT: "0.0"          # zero-commission broker model
  FUTURES_FINANCING_RATE_PA: "0.05"      # 5% p.a.
  FUTURES_DEFAULT_LOT_SIZE_MWH: "1.0"

  # Frontend
  VITE_API_BASE_URL: "/api"
  VITE_WS_BASE_URL: "/ws"

---
# =============================================================================
# Secret template – replace placeholder values with real secrets before apply.
# In production, manage this with Sealed Secrets, Vault, or SOPS.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: powerprice-secrets
  namespace: powerprice
  labels:
    app: powerprice
type: Opaque
stringData:
  # Database password
  POSTGRES_PASSWORD: "CHANGE_ME_IN_PRODUCTION"

  # Full DSN (used by SQLAlchemy / Alembic)
  DATABASE_URL: "postgresql+asyncpg://ppuser:CHANGE_ME_IN_PRODUCTION@postgres:5432/powerprice"
  DATABASE_URL_SYNC: "postgresql://ppuser:CHANGE_ME_IN_PRODUCTION@postgres:5432/powerprice"

  # JWT / session
  SECRET_KEY: "CHANGE_ME_IN_PRODUCTION_use_openssl_rand_hex_32"
  JWT_ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "60"

  # External API keys
  ENTSOE_API_KEY: "CHANGE_ME_get_from_transparency.entsoe.eu"

  # Flower basic auth (user:password)
  FLOWER_BASIC_AUTH: "admin:CHANGE_ME_IN_PRODUCTION"
